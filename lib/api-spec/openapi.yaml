openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chat
    description: AI code review chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a code review message
      description: Sends a question and code snippet to the AI for review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /chat/history:
    get:
      operationId: getChatHistory
      tags: [chat]
      summary: Get chat history
      description: Returns recent chat messages
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ChatRequest:
      type: object
      properties:
        question:
          type: string
          description: The user's question about the code
        code:
          type: string
          description: The code snippet to review
      required:
        - question
        - code
    ChatResponse:
      type: object
      properties:
        answer:
          type: string
          description: The AI's code review response
        id:
          type: integer
          description: Message ID
      required:
        - answer
        - id
    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        code:
          type: string
        answer:
          type: string
        createdAt:
          type: string
      required:
        - id
        - question
        - code
        - answer
        - createdAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
